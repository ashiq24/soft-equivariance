# Configuration for Lorentz-equivariant MLP training on ParticleInteraction
base_lorentz:
  experiment:
    name: lorentz_equivariant_mlp
    project: soft-equivariance_misc_lorentz
    seed: 42

  data:
    dataset: particle_interaction
    in_features: 4
    out_features: 1
    n_train: 1000
    n_val: 1000
    n_test: 1000
    num_workers: 4
    noise_level: 0.0
    seed: 42

  model:
    type: filtered_lorentz
    group: Lorentz
    in_features: 4
    out_features: 1
    in_rep: V
    out_rep: S
    soft_thresholding: 0.5
    hard_mask: false
    use_invariant_filter: true
    hidden_features: [400, 200, 200, 200]
    standardize: true
    hard: false
    use_tensor_hidden: false
    hidden_reps: ['V', 'V', 'V', 'V']

  training:
    epochs: 500
    batch_size: 500
    learning_rate: 0.0001
    weight_decay: 0.00000
    aug_eval_every: 200
    include_augmented: true
    scheduler:
      type: CosineAnnealingLR
      T_max: 500
      eta_min: 0.00001
    checkpoint_dir: logs/misc_lorentz

  logging:
    use_wandb: true
    log_interval: 50
    checkpoint_dir: "./logs/misc_lorentz"
    wandb_dir: './logs/misc_lorentz/wandb'
    wandb_project: soft-equivariance
    wandb_entity: null

emlp_lorentz:
  inherit_from: base_lorentz
  training:
    epochs: 500
    batch_size: 500
    learning_rate: 0.01
    weight_decay: 0.0
    aug_eval_every: 50
    include_augmented: true
    scheduler:
      type: StepLR
      step_size: 100
      gamma: 0.1
  model:
    use_original_emlp: true
    use_linear: false
    use_non_eq: false
    type: emlp_lorentz
    hidden_features: [256, 256, 256]
    standardize: true
    use_rpp: false
    rpp_factor: 0.0

mlp_lorentz:
  inherit_from: emlp_lorentz
  model:
    use_non_eq: true
    hidden_features: [512, 512, 512]

rpp_emlp_lorentz:
  inherit_from: emlp_lorentz
  model:
    use_rpp: true
    rpp_factor: 0.5
