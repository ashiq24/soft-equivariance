      out_channels: 1
      group_type: "rotation"

segformer_canon_c18:
  inherit_from: segformer_canon
  experiment:
    run_name: segformer_canon_c18_pascal_voc
  data:
    eval_rot: 30.0
  model:
    canonicalization:
      n_rotations: 18
      group_type: "rotation"

dinov2_seg_canon:
  inherit_from: dinov2_seg
  experiment:
    run_name: dinov2_seg_canonicalization_pascal_voc
  model:
    type: "filtered_dinov2_seg_canon"  
    soft_thresholding: 1.0
    soft_thresholding_pos: 1.0
    filter_patch_embeddings: false
    filter_attention_qkv: false
    filter_attention_output: false

    canonicalization:
      n_rotations: 4
      in_channels: 3
      mid_channels: [16, 16]
      out_channels: 1
      group_type: "rotation"

dinov2_seg_canon_c18:
  inherit_from: dinov2_seg_canon
  experiment:
    run_name: dinov2_seg_canon_c18_pascal_voc
  data:
    eval_rot: 30.0
  model:
    canonicalization:
