# Configurations for DINOv2-based classification experiments on CIFAR-10 and CIFAR-100
dinov2_base:
  experiment:
    project: soft-equivariance-cifar-rebut
    run_name: dinov2_base
    seed: 42
    device: auto

  data:
    root: ./data
    dataset: cifar10
    batch_size: 128
    num_workers: 6
    image_size: 224
    augmentation: true
    eval_rot: 30.0
    topk_accuracy: 5

  model:
    type: "filtered_dinov2"
    pretrained_model: "facebook/dinov2-base"
    num_labels: 10
    filter_patch_embeddings: true
    filter_attention_qkv: false
    filter_attention_output: false
    filter_mlp: false
    group_type: "rotation"
    n_rotations: 4
    soft_thresholding: 0.0
    soft_thresholding_pos: 0.0
    decomposition_method: "schur"
    hard_mask: false
    preserve_norm: false
    freeze_patch_embeddings: false
    freeze_position_embeddings: false

  train:
    epochs: 30
    lr: 5e-5
    backbone_lr: null
    weight_decay: 0.0
    scheduler:
      type: CosineAnnealingLR
      T_max: 30

  logging:
    use_wandb: true
    log_interval: 50
    checkpoint_dir: "./logs/weights"
    wandb_dir: './logs/classification'

###
# DINOv2 with Register Tokens Configuration
###
dinov2_base_reg:
  inherit_from: dinov2_base
  experiment:
    run_name: dinov2_base_reg
  model:
    pretrained_model: "facebook/dinov2-with-registers-small"  # DINOv2 with 4 register tokens

###
