###
# Canonicalization Baseline Configurations
###


cifar10_dinov2_canon:
  inherit_from: dinov2_base
  experiment:
    run_name: cifar10_dinov2_canonicalization
  
  model:
    type: "filtered_dinov2_canon"
    soft_thresholding: 1.0
    soft_thresholding_pos: 1.0
    filter_patch_embeddings: false
    filter_attention_qkv: false
    filter_attention_output: false
    canonicalization:
      n_rotations: 4
      in_channels: 3
      mid_channels: [16, 16]
      out_channels: 1
      group_type: "rotation"

