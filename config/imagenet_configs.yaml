    model_ema: false


imagenet1k_dinov2_canon_c18:
  inherit_from: imagenet1k_dinov2_canon
  experiment:
    run_name: imagenet1k_dinov2_canon_c18
  data:
    eval_rot: 30
  model:
    n_rotations: 18
    canonicalization:
      n_rotations: 18
