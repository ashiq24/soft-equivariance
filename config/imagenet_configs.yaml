# --------------------------------------------------
# ResNet-50 ImageNet-1k Configurations
# --------------------------------------------------
resnet_base:
  experiment:
    project: soft-equivariance-imagenet-rebut
    run_name: imagenet1k_resnet
    seed: 42
    device: auto
  data:
    root: /datasets/imagenet/ 
    dataset: imagenet
    image_size: 224
    augmentation: true
    eval_rot: 30
    topk_accuracy: 5
  model:
    type: "filtered_resnet"
    pretrained_model: "microsoft/resnet-50"
    num_labels: 1000
    n_rotations: 4
    soft_thresholding: 1.0
    decomposition_method: "schur"
    preserve_norm: false
    freeze_filters: false
    min_filter_size: 1
  train:
    optimizer: "adamw"
    epochs: 15
    lr: 1e-4
    weight_decay: 0.05
    scheduler:
      type: CosineAnnealingLR
      T_max: 10
      eta_min: 1e-6
  logging:
    use_wandb: true
    log_interval: 50
    checkpoint_dir: "./logs"

imagenet1k_resnet:
  inherit_from: resnet_base
  experiment:
    run_name: imagenet1k_resnet

imagenet1k_resnet_c18:
  inherit_from: resnet_base
  experiment:
    run_name: imagenet1k_resnet_c18
  model:
    n_rotations: 18
    soft_thresholding: 0.0
  data:
    eval_rot: 30

# Canonicalization baseline
imagenet1k_resnet_canon:
  inherit_from: resnet_base
  experiment:
    run_name: imagenet1k_resnet_canon
  model:
    type: "filtered_resnet_canon"
    soft_thresholding: 1.0
    canonicalization:
      n_rotations: 4
      in_channels: 3
      mid_channels: [16, 16]
      out_channels: 1
      group_type: "rotation"
  train:
    model_ema: false

imagenet1k_resnet_canon_c18:
  inherit_from: imagenet1k_resnet_canon
  experiment:
    run_name: imagenet1k_resnet_canon_c18
  model:
    canonicalization:
      n_rotations: 18
      group_type: "rotation"
  data:
    eval_rot: 30